<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picker — Vanilla Lexicon</title>
  <script>(function(){
    var S=['light-hc','dark','dark-hc'];
    function apply(){try{var s=localStorage.getItem('vanilla-skin');S.forEach(function(c){document.documentElement.classList.remove(c);});if(s&&S.indexOf(s)>-1)document.documentElement.classList.add(s);}catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="tokens-high-contrast.css">
  <link rel="stylesheet" href="tokens-dark.css">
  <link rel="stylesheet" href="components.css">
  <script src="icons.js"></script>

  <style>
    .showcase { max-width: 880px; margin: 0 auto; padding: var(--spacing-9) var(--spacing-7); background: var(--color-light); }
    .showcase h1 { font-size: var(--font-size-md); font-weight: var(--font-weight-bold); margin: 0 0 var(--spacing-3); }
    .showcase p.lead { color: var(--color-secondary); font-size: var(--font-size-sm); margin: 0 0 var(--spacing-8); }
    .showcase__row { margin-bottom: var(--spacing-9); display: flex; gap: var(--spacing-7); align-items: flex-start; flex-wrap: wrap; }
    .showcase__label { flex: 0 0 100%; display: block; font-size: 10px; font-weight: var(--font-weight-bold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-secondary); margin-bottom: var(--spacing-3); }
  </style>
</head>
<body>

<main class="showcase">
  <h1>Picker</h1>
  <p class="lead">
    Source: <a href="https://www.figma.com/design/YNNkt9Xd6ImDtEvIz4tETF/Lexicon-Components?node-id=5982-705">Figma — Lexicon Components</a>.
    Single-select trigger paired with a <code>.dropdown</code> menu. Selected option uses <code>.is-active</code> + a leading <code>#check</code> icon.
  </p>

  <div class="showcase__row">
    <span class="showcase__label">Trigger only · trigger + open menu (selected option highlighted)</span>

    <div class="picker">
      <button class="btn btn--secondary picker__trigger" type="button">
        <span class="picker__trigger-text">Option</span>
        <svg class="lexicon-icon"><use href="#caret-double-l"></use></svg>
      </button>
    </div>

    <div class="picker">
      <button class="btn btn--secondary picker__trigger" type="button">
        <span class="picker__trigger-text">Option</span>
        <svg class="lexicon-icon"><use href="#caret-double-l"></use></svg>
      </button>
      <ul class="dropdown" role="listbox">
        <li><button class="dropdown__item" role="option">Option</button></li>
        <li><button class="dropdown__item" role="option">Option</button></li>
        <li><button class="dropdown__item is-active" role="option" aria-selected="true">
          <svg class="lexicon-icon dropdown__item-icon"><use href="#check"></use></svg>
          Option
        </button></li>
        <li><button class="dropdown__item" role="option">Option</button></li>
        <li><button class="dropdown__item" role="option">Option</button></li>
      </ul>
    </div>
  </div>

</main>

</body>
</html>
