  <title>PLG — Walkthrough</title>

  <script>(function(){
    var S=['light','light-hc','dark','dark-hc'];
    function apply(){try{
      var r=document.documentElement;
      var s=localStorage.getItem('vanilla-skin')||'light';
      S.forEach(function(c){r.classList.remove(c);});
      r.classList.add(S.indexOf(s)>-1?s:'light');
      if(localStorage.getItem('vanilla-cms-style')==='1'){
        r.style.setProperty('--rounded-sm','4px');
        r.style.setProperty('--rounded-md','8px');
        r.style.setProperty('--rounded-lg','16px');
      }else{
        r.style.removeProperty('--rounded-sm');
        r.style.removeProperty('--rounded-md');
        r.style.removeProperty('--rounded-lg');
      }
    }catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>

  <style>
    html, body { height: 100%; }

    /* ── Control Panel collapse (from shells/dxp.html) ───────── */
    body { grid-template-columns: 320px 1fr; transition: grid-template-columns 200ms ease; }
    body.cp-collapsed { grid-template-columns: 0 1fr; }
    .control-panel { transition: width 200ms ease; }
    body.cp-collapsed .control-panel {
      width: 0;
      overflow: hidden;
      border-right-width: 0;
    }

    .control-panel__actions {
      align-items: center;
      display: flex;
      flex-shrink: 0;
      gap: var(--spacing-2);
      margin-left: auto;
    }

    .control-panel__close { order: 1; }
    .control-panel__close:not(:focus-visible) {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .control-panel:focus { outline: none; }

    .cp-tip { position: relative; display: inline-flex; }
    .cp-tip__bubble {
      position: absolute;
      top: calc(100% + var(--spacing-2));
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 20;
    }
    .cp-tip:hover .cp-tip__bubble,
    .cp-tip:focus-within .cp-tip__bubble { opacity: 1; }

    /* ── PLG walkthrough glue ────────────────────────────────────
       The mask reuses .modal-overlay (z-index 1000). The plate is a
       white padded box drawn behind the spotlit target; the target
       itself is lifted above the mask with .plg-spotlit. */
    #plg-mask { padding: 0; }
    .plg-plate {
      position: fixed;
      z-index: 1001;
      background: var(--color-white);
      border-radius: var(--rounded-lg);
      box-shadow: var(--shadow-lg);
    }
    .plg-spotlit { position: relative; z-index: 1002; }
    .plg-tour-popover {
      position: fixed;
      z-index: 1003;
      width: 480px;
      max-width: 480px;
    }
  </style>
</head>

<!-- Collapsible Control Panel groups -->
<script>
  (function () {
    document.querySelectorAll('.control-panel__group-header').forEach(function (btn) {
      var chevron = btn.querySelector('svg.lexicon-icon:last-child');
      if (chevron) chevron.style.transition = 'transform 150ms ease';

      var group = btn.parentElement;
      var items = group ? Array.from(group.querySelectorAll('.control-panel__item')) : [];

      if (btn.getAttribute('aria-expanded') === 'false') {
        items.forEach(function (el) { el.style.display = 'none'; });
        if (chevron) chevron.style.transform = 'rotate(-90deg)';
      }

      btn.addEventListener('click', function () {
        var expanded = btn.getAttribute('aria-expanded') !== 'false';
        var next = !expanded;
        btn.setAttribute('aria-expanded', String(next));
        items.forEach(function (el) { el.style.display = next ? '' : 'none'; });
        if (chevron) chevron.style.transform = next ? '' : 'rotate(-90deg)';
      });
    });
  })();
</script>

<!-- Control Panel open/close -->
<script>
  (function () {
    var toggle = document.getElementById('cp-toggle');
    var toggleIcon = document.getElementById('cp-toggle-icon');
    var close = document.getElementById('cp-close');
    var panel = document.getElementById('control-panel');

    function setOpen(open) {
      document.body.classList.toggle('cp-collapsed', !open);
      if (toggle) toggle.setAttribute('aria-expanded', String(open));
      if (toggleIcon) {
        var use = toggleIcon.querySelector('use');
        if (use) use.setAttribute('href', open ? '#product-menu-open' : '#product-menu-closed');
      }
    }

    if (toggle) toggle.addEventListener('click', function (e) {
      var willOpen = document.body.classList.contains('cp-collapsed');
      setOpen(willOpen);
      if (willOpen && e.detail === 0 && panel) panel.focus();
    });

    if (close) close.addEventListener('click', function (e) {
      setOpen(false);
      if (e.detail === 0 && toggle) toggle.focus();
    });
  })();
</script>

<!-- Dark / Light switch -->
<script>
  (function () {
    var SKINS = ['light', 'light-hc', 'dark', 'dark-hc'];
    var btn = document.getElementById('cp-theme-toggle');
    var icon = document.getElementById('cp-theme-icon');
    var tip = document.getElementById('cp-theme-tip');
    if (!btn) return;

    function current() {
      try { return localStorage.getItem('vanilla-skin') || 'light'; } catch (e) { return 'light'; }
    }

    function render() {
      var isDark = current().indexOf('dark') === 0;
      var use = icon.querySelector('use');
      if (use) use.setAttribute('href', isDark ? '#sun' : '#moon');
      var label = isDark ? 'Switch to light mode' : 'Switch to dark mode';
      btn.setAttribute('aria-label', label);
      btn.setAttribute('aria-pressed', String(isDark));
      if (tip) tip.textContent = label;
    }

    btn.addEventListener('click', function () {
      var next = current().indexOf('dark') === 0 ? 'light' : 'dark';
      var r = document.documentElement;
      SKINS.forEach(function (c) { r.classList.remove(c); });
      r.classList.add(next);
      try { localStorage.setItem('vanilla-skin', next); } catch (e) {}
      render();
    });

    render();
  })();
</script>

<!-- PLG walkthrough: 3-step spotlight tour, starts on load -->
<script>
  (function () {
    var GAP = 12;        // space between plate and popover
    var STEPS = [
      {
        target: '#tour-search .search',
        title: 'Step 1 of 3: New Control Panel Search',
        body: 'A faster and easier way to find exactly what you need in the Control Panel, with improved search and filtering.',
        place: 'right',
        pad: 16
      },
      {
        target: '#tour-quick-actions',
        title: 'Step 2 of 3: Quick Actions',
        body: 'Faster access to common actions, helping users get things done with fewer steps.',
        place: 'below',
        pad: 24
      },
      {
        target: '#tour-recent',
        title: 'Step 3 of 3: Introducing Recent',
        body: 'Quickly jump back to the Control Panel pages you’ve recently used and continue where you left off.',
        place: 'above',
        pad: 24
      }
    ];

    var mask = document.getElementById('plg-mask');
    var plate = document.getElementById('plg-plate');
    var popover = document.getElementById('plg-popover');
    var titleEl = document.getElementById('plg-popover-title');
    var bodyEl = document.getElementById('plg-popover-body');
    var arrow = document.getElementById('plg-arrow');
    var prevBtn = document.getElementById('plg-prev');
    var nextBtn = document.getElementById('plg-next');
    var current = -1;

    function clearSpotlight() {
      document.querySelectorAll('.plg-spotlit').forEach(function (el) {
        el.classList.remove('plg-spotlit');
      });
    }

    function endTour() {
      current = -1;
      clearSpotlight();
      mask.style.display = 'none';
      plate.style.display = 'none';
      popover.style.display = 'none';
    }

    function position(step) {
      var target = document.querySelector(step.target);
      if (!target) return;

      var r = target.getBoundingClientRect();
      var pad = step.pad;

      // Spotlight plate — white padded box behind the lifted target
      plate.style.left = (r.left - pad) + 'px';
      plate.style.top = (r.top - pad) + 'px';
      plate.style.width = (r.width + pad * 2) + 'px';
      plate.style.height = (r.height + pad * 2) + 'px';

      // Popover — measure, then place relative to the plate
      var pw = popover.offsetWidth;
      var ph = popover.offsetHeight;
      var left, top;

      if (step.place === 'right') {
        left = r.right + pad + GAP;
        top = r.top - pad;
        arrow.style.cssText = 'left:-4px; top:24px; bottom:auto; margin-left:0;';
      } else if (step.place === 'below') {
        left = r.left + (r.width - pw) / 2;
        top = r.bottom + pad + GAP;
        arrow.style.cssText = 'top:-4px; bottom:auto;';
      } else { // above
        left = r.left + (r.width - pw) / 2;
        top = r.top - pad - GAP - ph;
        arrow.style.cssText = '';
      }

      // Keep the popover inside the viewport
      left = Math.max(GAP, Math.min(left, window.innerWidth - pw - GAP));
      top = Math.max(GAP, Math.min(top, window.innerHeight - ph - GAP));

      popover.style.left = left + 'px';
      popover.style.top = top + 'px';
    }

    function showStep(index) {
      var step = STEPS[index];
      var target = document.querySelector(step.target);
      if (!step || !target) return;

      current = index;
      clearSpotlight();
      target.classList.add('plg-spotlit');
      if (target.scrollIntoView) target.scrollIntoView({ block: 'nearest' });

      titleEl.textContent = step.title;
      bodyEl.textContent = step.body;
      prevBtn.style.display = index === 0 ? 'none' : '';
      nextBtn.textContent = index === STEPS.length - 1 ? 'Ok' : 'Next';

      mask.style.display = 'block';
      plate.style.display = 'block';
      popover.style.display = '';
      position(step);
    }

    // Walkthrough actions
    nextBtn.addEventListener('click', function () {
      if (current >= STEPS.length - 1) endTour();
      else showStep(current + 1);
    });
    prevBtn.addEventListener('click', function () {
      if (current > 0) showStep(current - 1);
    });
    document.getElementById('plg-tour-close').addEventListener('click', endTour);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && current !== -1) endTour();
    });

    // Keep mask/plate/popover glued to the target
    window.addEventListener('resize', function () {
      if (current !== -1) position(STEPS[current]);
    });
    var main = document.querySelector('main');
    if (main) main.addEventListener('scroll', function () {
      if (current !== -1) position(STEPS[current]);
    });

    // Start the walkthrough immediately
    showStep(0);
  })();
</script>
