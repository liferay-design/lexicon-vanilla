<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Sidebar — Lexicon Vanilla</title>

  <script>(function(){
    var S=['light','light-hc','dark','dark-hc'];
    function apply(){try{
      var r=document.documentElement;
      var s=localStorage.getItem('vanilla-skin')||'light';
      S.forEach(function(c){r.classList.remove(c);});
      r.classList.add(S.indexOf(s)>-1?s:'light');
      if(localStorage.getItem('vanilla-cms-style')==='1'){
        r.style.setProperty('--rounded-sm','4px');
        r.style.setProperty('--rounded-md','8px');
        r.style.setProperty('--rounded-lg','16px');
      }else{
        r.style.removeProperty('--rounded-sm');
        r.style.removeProperty('--rounded-md');
        r.style.removeProperty('--rounded-lg');
      }
    }catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../tokens-high-contrast.css">
  <link rel="stylesheet" href="../tokens-dark.css">
  <link rel="stylesheet" href="../components.css">
  <script src="../icons.js"></script>

  <style>
    /* Page-level tokens.
       · --font-family-title / --font-family-base: display + body faces.
       · --sidebar-width: single source of truth for the docked panel width
         (consumed by the panel, main's pinned margin, and the control-menu
         title's pinned shift). Overriding it re-widens all three at once.
       · --cp-chrome-h: shared chrome height so the panel header stays locked
         to the control-menu bar. Drops to 48px in the compact breakpoint
         (see the @media block near the bottom of this stylesheet); the
         control-menu already compacts to 48px in that range on its own
         (components.css), so both stay in sync via the token. */
    :root {
      --font-family-title: 'Source Sans 3', system-ui, -apple-system, 'system-ui',
        'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue',
        Arial, sans-serif;
      /* Page-wide Source Sans Pro trial — every component reads
         --font-family-base, so overriding it here re-fonts the whole page.
         'Source Sans 3' covers newer installs (same face, renamed). Delete
         this one declaration to revert to the system stack. */
      --font-family-base: 'Source Sans Pro', 'Source Sans 3', -apple-system,
        BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --sidebar-width: 280px;
      --cp-chrome-h: calc(var(--spacing-10) + var(--spacing-3)); /* 56px */
    }

    /* Bigger, display-face titles: Site Builder (Control Menu) and
       Control Panel (sidebar header). */
    .control-menu__title,
    .control-panel--floating .control-panel__title {
      font-family: var(--font-family-title);
      font-size: var(--font-size-lg);
    }

    html, body { height: 100%; }
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Modern sidebar (docked drawer) ──────────────────────────
       The Control Panel sits flush to the screen edge, full height.
       Three states:
         · hidden   — default when unpinned
         · sb-peek  — hover on the menu toggle reveals it as overlay
         · sb-pinned— click on the toggle docks it; content shifts  */
    .control-panel--floating {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      z-index: 50;
      /* Right border only — the panel sits flush to the screen edge, so a
         left border would paint a stray 1px line along it. The border lives
         in every state (never toggled on pin) to avoid the 1px content-box
         flicker. */
      border-right: 1px solid var(--color-secondary-l2);
      /* Hidden state: short 24px slide + fade. The corner button sits above the
         panel (z-index), so only the panel body slides/fades beneath a
         stationary button. Visibility flips after the fade so it can't catch
         the pointer. */
      transform: translateX(calc(-1 * var(--spacing-7)));
      opacity: 0;
      visibility: hidden;
      transition: transform 140ms ease-out, opacity 140ms ease-out,
                  visibility 0s linear 140ms, box-shadow 140ms ease;
    }
    body.sb-pinned .control-panel--floating,
    body.sb-peek .control-panel--floating {
      transform: translateX(0);
      opacity: 1;
      visibility: visible;
      transition: transform 140ms ease-out, opacity 140ms ease-out,
                  visibility 0s, box-shadow 140ms ease;
    }
    /* Peek overlays the content → elevated; pinned sits in the layout → flat. */
    body.sb-peek:not(.sb-pinned) .control-panel--floating { box-shadow: var(--shadow-lg); }

    /* The menu toggle never moves: it stays in the Control Menu flow but
       paints above the floating panel (z-index), becoming part of its header
       row, so the panel body can dissolve beneath a stationary button. */
    .control-menu__btns { position: relative; z-index: 60; }
    /* 8px between the toggle and the "Site Builder" title (matches the side
       menu header's button→title gap). */
    .control-menu__left { gap: var(--spacing-3); }

    /* ── One static toggle, content swaps by state ───────────────
       A single button paints above the floating panel (z-index) and never
       moves. Closed → menu icon (top-bar look). Panel out (peek/pinned) →
       brand image at rest, menu icon on hover/focus. On close only the panel
       body dissolves beneath the stationary button — no button vanishes or
       reappears. Fixed 32×32 so image (32px sticker) and icon (16px, centred)
       never shift it. */
    .cp-toggle--branded {
      width: var(--spacing-8);
      height: var(--spacing-8);
      padding: 0;
    }
    .cp-toggle--branded {
      width: var(--spacing-8);
      height: var(--spacing-8);
      padding: 0;
    }
    /* The product icon carries its own artwork on transparency — drop the
       sticker's default fill so no grey shows behind its margins. */
    .cp-toggle__brand { background: transparent; }

    /* Two artworks, one per skin family: light PNG by default, dark PNG
       (own dark rounded backplate) when a dark skin class sits on <html>.
       The .cp-toggle__brand > … compound outranks the kit's `.sticker > img`
       rule, which would otherwise force both images to display. */
    .cp-toggle__brand > .cp-toggle__brand-img--dark { display: none; }
    .dark .cp-toggle__brand > .cp-toggle__brand-img--dark,
    .dark-hc .cp-toggle__brand > .cp-toggle__brand-img--dark { display: block; }
    .dark .cp-toggle__brand > .cp-toggle__brand-img--light,
    .dark-hc .cp-toggle__brand > .cp-toggle__brand-img--light { display: none; }

    /* Closed (button reads as the top-bar toggle): menu icon, never the image. */
    #cp-toggle .cp-toggle__brand { display: none; }
    #cp-toggle #cp-toggle-icon { display: block; }

    /* Pinned: the toggle reads as active. light-d1 (#E2E4EA) reads too
       strong here, so soften it: 8% of --color-dark over the white bar
       ≈ #EEEEEF, and the token flips per skin (a light tint in dark mode).
       Hover doesn't override it. */
    body.sb-pinned #cp-toggle,
    body.sb-pinned #cp-toggle:hover {
      background: color-mix(in srgb, var(--color-dark) 8%, transparent);
    }

    /* Panel peeked (unpinned): the button reads as the panel's header button →
       brand image at rest; on hover / keyboard focus it swaps to the menu icon
       (what the click will do). Pinned: no image swap — the base rules above
       keep the menu icon (product-menu-open → "click closes") at all times. */
    body.sb-peek:not(.sb-pinned) #cp-toggle .cp-toggle__brand { display: inline-flex; }
    body.sb-peek:not(.sb-pinned) #cp-toggle #cp-toggle-icon { display: none; }
    body.sb-peek:not(.sb-pinned) #cp-toggle:hover .cp-toggle__brand,
    body.sb-peek:not(.sb-pinned) #cp-toggle:focus-visible .cp-toggle__brand { display: none; }
    body.sb-peek:not(.sb-pinned) #cp-toggle:hover #cp-toggle-icon,
    body.sb-peek:not(.sb-pinned) #cp-toggle:focus-visible #cp-toggle-icon { display: block; }

    /* Header row geometry: height comes from --cp-chrome-h (56 normal, 48
       compact) so it stays locked to the control-menu bar. Left padding
       clears the 32px menu toggle overlaying this corner and leaves an 8px
       button→title gap; the compact @media below tightens it to match the
       control-menu's own narrower horizontal padding at that width. */
    .control-panel--floating .control-panel__header {
      height: var(--cp-chrome-h);
      padding: 0 var(--spacing-4) 0 calc(var(--spacing-10) + var(--spacing-3));
    }
    .control-panel--floating .control-panel__search { padding-top: var(--spacing-4); }

    /* Compact 32px search across both breakpoints — the kit default input
       field is 40px, but the panel reads better with a slimmer field. The
       kit's 16px side padding feels too airy at 32px tall, so tighten the
       left inset to 12 (right stays wide for the icons — 64px, set by
       .search__field). */
    .control-panel--floating .control-panel__search .input__field {
      height: var(--spacing-8);
      padding-left: var(--spacing-4);
    }

    /* Tighter rhythm between section groups (base is --spacing-5). */
    .control-panel--floating .control-panel__groups { gap: var(--spacing-3); }

    /* ── Modern scrollbar ───────────────────────────────────────
       Thin floating pill, no track. The 2px transparent border +
       background-clip insets a 4px thumb inside an 8px gutter. The
       secondary scale is defined per skin, so it follows dark/HC. */
    .control-panel__body,
    main {
      scrollbar-width: thin;
      scrollbar-color: var(--color-secondary-l2) transparent;
    }
    .control-panel__body::-webkit-scrollbar,
    main::-webkit-scrollbar { width: var(--spacing-3); }
    .control-panel__body::-webkit-scrollbar-track,
    main::-webkit-scrollbar-track { background: transparent; }
    .control-panel__body::-webkit-scrollbar-thumb,
    main::-webkit-scrollbar-thumb {
      background: var(--color-secondary-l2);
      background-clip: padding-box;
      border: var(--spacing-1) solid transparent;
      border-radius: var(--rounded-full);
    }
    .control-panel__body::-webkit-scrollbar-thumb:hover,
    main::-webkit-scrollbar-thumb:hover {
      background-color: var(--color-secondary-l0);
      background-clip: padding-box;
    }

    /* Pinned: page content and Control Menu title make room. */
    /* Content shift on pin/unpin: ease-out quint — fast start that
       decelerates into place, so the reflow reads as one soft glide. */
    main { transition: margin-left 320ms cubic-bezier(0.22, 1, 0.36, 1); }
    body.sb-pinned main { margin-left: var(--sidebar-width); }
    .control-menu__title { transition: margin-left 320ms cubic-bezier(0.22, 1, 0.36, 1); }
    /* Title rests at x 56 (16px bar padding + 32px toggle + 8px gap); the
       panel's right edge is at --sidebar-width. Shift the title so it clears
       the panel with a 24px gap from the panel edge. */
    body.sb-pinned .control-menu__title {
      margin-left: calc(var(--sidebar-width) - var(--spacing-8));
    }

    /* ── Compact chrome breakpoint ──────────────────────────────
       The kit already compacts .control-menu to 48px at ≤767px
       (components.css). We match that here by dropping --cp-chrome-h
       and tightening the panel-header padding so the toggle→title gap
       stays visually consistent. Below the same breakpoint the panel
       behaves as an overlay — pinned no longer pushes the layout. The
       panel BODY (items, indent, gaps, icons, typography) stays
       identical at both sizes. */
    @media (max-width: 767px) {
      :root { --cp-chrome-h: var(--spacing-10); } /* 48px */

      /* Tighter side padding on the top bar than the kit default (12 → 8)
         so the toggle sits closer to the viewport edge on narrow screens. */
      .control-menu {
        padding-left: var(--spacing-3);
        padding-right: var(--spacing-3);
      }

      .control-panel--floating .control-panel__header {
        /* toggle at x = spacing-3 (8) + spacing-8 (32) = 40 → 8px gap
           → title starts at 48 = spacing-10 */
        padding: 0 var(--spacing-3) 0 var(--spacing-10);
      }

      /* Tighter side padding on the search wrapper (16 → 12); vertical
         padding stays as declared above. */
      .control-panel--floating .control-panel__search {
        padding-left: var(--spacing-4);
        padding-right: var(--spacing-4);
      }

      /* Slightly smaller display face on the two shell titles — both keep
         their ellipsis (already declared on the base .control-menu__title
         and .control-panel__title rules). */
      .control-menu__title,
      .control-panel--floating .control-panel__title {
        font-size: var(--font-size-md);
      }

      /* Overlay-only pinned: no push, no title shift. */
      body.sb-pinned main { margin-left: 0; }
      body.sb-pinned .control-menu__title { margin-left: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .control-panel--floating, main, .control-menu__title { transition: none; }
    }

    /* ── Empty-state illustration in dark skins ─────────────────
       The SVG ships hardcoded light grays and loads via <img>, so it
       can't see tokens. The filter chain re-maps whites/grays into
       dark blue-tinted tones that sit well on the dark surfaces. */
    .dark .empty-state__media img,
    .dark-hc .empty-state__media img {
      filter: invert(0.8) sepia(0.8) hue-rotate(198deg) saturate(1) brightness(0.52);
    }

    /* ── Header action buttons ──────────────────────────────────
       Theme switch + Sites + Close, pinned to the right of the title. */
    .control-panel__actions {
      align-items: center;
      display: flex;
      flex-shrink: 0;
      gap: var(--spacing-2);
      margin-left: auto;
    }

    /* Close button: behaves like Bootstrap's visually-hidden-focusable.
       While it lacks keyboard focus it is pulled out of flow (position:
       absolute → no longer a flex item), so it reserves no space and no
       gap. On keyboard focus it snaps back into the row at full size.
       It is first in the DOM (first Tab stop) but `order` renders it last. */
    .control-panel__close { order: 1; }
    .control-panel__close:not(:focus-visible) {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    /* The panel receives focus (tabindex=-1) when opened by keyboard; it is
       a deliberate jump, so suppress the container outline. */
    .control-panel:focus { outline: none; }

    /* ── Hover / focus tooltip ──────────────────────────────────
       Reuses the .tooltip component visual; the wrapper anchors it
       below the button and reveals it on hover or keyboard focus. */
    .cp-tip { position: relative; display: inline-flex; }
    .cp-tip__bubble {
      position: absolute;
      top: calc(100% + var(--spacing-2));
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 20;
    }
    /* Show on hover or *keyboard* focus only — a plain :focus-within would
       pin the tooltip after a mouse click, since the button keeps focus. */
    .cp-tip:hover .cp-tip__bubble,
    .cp-tip:has(:focus-visible) .cp-tip__bubble { opacity: 1; }

    /* Toggle sits at the screen's left edge → left-align its tooltip so it
       opens rightward with the arrow near the left (tooltip--align-start puts
       the arrow 12px in; offset the bubble so that arrow points at the button
       centre). */
    #cp-toggle-tip { left: var(--spacing-2); transform: none; }
    /* JS-controlled visibility (timed show / auto-hide / reset on click); the
       ID specificity overrides the shared .cp-tip:hover/:focus-within rule. */
    #cp-toggle-tip { opacity: 0; }
    #cp-toggle-tip.is-visible { opacity: 1; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════
     Modern Sidebar shell — docked Control Panel + Control Menu + content

     Interaction:
       • The panel sits flush to the screen edge, full height.
       • The Control Menu toggle never moves. Hovering it while the
         panel is unpinned peeks the panel as an overlay; clicking it
         pins/unpins the panel (pinned = content shifts right).
       • Esc dismisses a peeked panel; the hidden Close button inside
         the header keeps the keyboard path from dxp.html.
     ════════════════════════════════════════════════════════════════ -->

<!-- ─── Control Menu (full width, always on top of the page flow) ── -->
<div class="control-menu">
  <div class="control-menu__left">
    <div class="control-menu__btns">
      <span class="cp-tip">
        <button class="control-menu__btn cp-toggle--branded" id="cp-toggle" type="button" aria-label="Pin Menu" aria-expanded="false" aria-controls="control-panel">
          <!-- Single static button. Closed → menu icon (top-bar look). Panel out
               (peek/pinned) → brand image at rest, menu icon on hover/focus. The
               button never disappears; only its content swaps, so the panel body
               dissolves beneath a stationary button (natural close). -->
          <span class="sticker sticker--md cp-toggle__brand" aria-hidden="true">
            <img class="cp-toggle__brand-img--light" src="img/control-panel-icon.png" alt="">
            <img class="cp-toggle__brand-img--dark" src="img/control-panel-icon-dark.png" alt="">
          </span>
          <svg class="lexicon-icon" id="cp-toggle-icon"><use href="#product-menu-closed"></use></svg>
        </button>
        <!-- "Pin Menu" when unpinned, "Close Menu" when pinned (text set in JS). -->
        <span class="tooltip tooltip--top tooltip--align-start cp-tip__bubble" id="cp-toggle-tip" role="tooltip">Pin Menu</span>
      </span>
    </div>
    <span class="control-menu__title">Home</span>
  </div>
  <div class="control-menu__right">
    <button class="control-menu__btn" type="button" aria-label="Global navigation">
      <svg class="lexicon-icon"><use href="#grid"></use></svg>
    </button>
    <div class="control-menu__avatar">
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=72&h=72&fit=crop&auto=format" alt="User avatar">
    </div>
  </div>
</div>

<!-- ─── Floating Control Panel ────────────────────────────────────── -->
<aside class="control-panel control-panel--floating" id="control-panel" tabindex="-1">

  <div class="control-panel__header">
    <span class="control-panel__title">Control Panel</span>

    <div class="control-panel__actions">
      <!-- Close — first in the DOM so it is the first Tab stop inside the panel;
           CSS `order` keeps it visually last of the three. Appears only on focus. -->
      <button class="btn btn--borderless btn--sm btn--icon control-panel__close" id="cp-close" type="button" aria-label="Close">
        <svg class="lexicon-icon"><use href="#times"></use></svg>
      </button>

      <!-- Dark / Light switch — moon (→ dark) / sun (→ light), with tooltip -->
      <span class="cp-tip">
        <button class="btn btn--borderless btn--sm btn--icon" id="cp-theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
          <svg class="lexicon-icon" id="cp-theme-icon"><use href="#moon"></use></svg>
        </button>
        <span class="tooltip tooltip--top cp-tip__bubble" id="cp-theme-tip" role="tooltip">Switch to dark mode</span>
      </span>

    </div>
  </div>

  <div class="control-panel__search">
    <div class="search">
      <input class="input__field search__field" type="search" placeholder="Search">
      <button class="search__clear" aria-label="Clear" hidden type="button">
        <svg class="lexicon-icon"><use href="#times-circle-full"></use></svg>
      </button>
      <button class="search__submit" aria-label="Search" type="button">
        <svg class="lexicon-icon"><use href="#search"></use></svg>
      </button>
    </div>
  </div>

  <div class="control-panel__body">
    <ul class="control-panel__groups">

      <!-- Home (active) -->
      <li class="control-panel__group">
        <button class="control-panel__item is-active" type="button">
          <span class="control-panel__item-icon">
            <svg class="lexicon-icon"><use href="#home"></use></svg>
          </span>
          Home
        </button>
      </li>

      <!-- Users — expanded by default -->
      <li class="control-panel__group">
        <button class="control-panel__group-header" type="button" aria-expanded="true">
          Users
          <svg class="lexicon-icon"><use href="#angle-down-small"></use></svg>
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#users"></use></svg></span>
          Users and Organizations
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#community"></use></svg></span>
          User Groups
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#organizations"></use></svg></span>
          Roles
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#display-content"></use></svg></span>
          Monitoring
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#suitcase"></use></svg></span>
          Service Accounts
        </button>
      </li>

      <!-- Sites — collapsed -->
      <li class="control-panel__group">
        <button class="control-panel__group-header" type="button" aria-expanded="false">
          Sites
          <svg class="lexicon-icon"><use href="#angle-down-small"></use></svg>
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#sites"></use></svg></span>
          Sites
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#site-template"></use></svg></span>
          Site Templates
        </button>
      </li>

      <!-- Accounts — collapsed -->
      <li class="control-panel__group">
        <button class="control-panel__group-header" type="button" aria-expanded="false">
          Accounts
          <svg class="lexicon-icon"><use href="#angle-down-small"></use></svg>
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#briefcase"></use></svg></span>
          Accounts
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#user"></use></svg></span>
          Accounts User
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#myspace"></use></svg></span>
          Account Groups
        </button>
      </li>

      <!-- Configuration — collapsed -->
      <li class="control-panel__group">
        <button class="control-panel__group-header" type="button" aria-expanded="false">
          Configuration
          <svg class="lexicon-icon"><use href="#angle-down-small"></use></svg>
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#hdd"></use></svg></span>
          System Settings
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#cog"></use></svg></span>
          Instance Settings
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#bell-on"></use></svg></span>
          Push Notifications
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#box-container"></use></svg></span>
          Components
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#search"></use></svg></span>
          Search
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#custom-field"></use></svg></span>
          Custom Fields
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#automatic-translate"></use></svg></span>
          Language Override
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#picture"></use></svg></span>
          Adaptive Media
        </button>
      </li>

      <!-- Notifications — collapsed -->
      <li class="control-panel__group">
        <button class="control-panel__group-header" type="button" aria-expanded="false">
          Notifications
          <svg class="lexicon-icon"><use href="#angle-down-small"></use></svg>
        </button>
        <button class="control-panel__item" type="button">
          <span class="control-panel__item-icon"><svg class="lexicon-icon"><use href="#bell-on"></use></svg></span>

<!-- Collapsible Control Panel groups -->
<script>
  (function () {
    document.querySelectorAll('.control-panel__group-header').forEach(function (btn) {
      var chevron = btn.querySelector('svg.lexicon-icon:last-child');
      if (chevron) chevron.style.transition = 'transform 150ms ease';

      var group = btn.parentElement;
      var items = group ? Array.from(group.querySelectorAll('.control-panel__item')) : [];

      // Sync initial collapsed state
      if (btn.getAttribute('aria-expanded') === 'false') {
        items.forEach(function (el) { el.style.display = 'none'; });
        if (chevron) chevron.style.transform = 'rotate(-90deg)';
      }

      btn.addEventListener('click', function () {
        var expanded = btn.getAttribute('aria-expanded') !== 'false';
        var next = !expanded;
        btn.setAttribute('aria-expanded', String(next));
        items.forEach(function (el) { el.style.display = next ? '' : 'none'; });
        if (chevron) chevron.style.transform = next ? '' : 'rotate(-90deg)';
      });
    });
  })();
</script>

<!-- Pin / peek behaviour — hover the menu toggle to peek, click to pin -->
<script>
  (function () {
    var body = document.body;
    var toggle = document.getElementById('cp-toggle');
    var toggleIcon = document.getElementById('cp-toggle-icon');
    var panel = document.getElementById('control-panel');
    var close = document.getElementById('cp-close');
    var toggleTip = document.getElementById('cp-toggle-tip');
    var hideTimer = null;

    function pinned() { return body.classList.contains('sb-pinned'); }

    function setIcon() {
      var p = pinned();
      var use = toggleIcon && toggleIcon.querySelector('use');
      if (use) use.setAttribute('href', p ? '#product-menu-open' : '#product-menu-closed');
      // Tooltip + accessible name follow the action the click will perform.
      var label = p ? 'Close Menu' : 'Pin Menu';
      if (toggleTip) toggleTip.textContent = label;
      toggle.setAttribute('aria-label', label);
    }

    function setPinned(on) {
      body.classList.toggle('sb-pinned', on);
      if (on) body.classList.remove('sb-peek');
      toggle.setAttribute('aria-expanded', String(on));
      setIcon();
    }

    function peek(on) {
      if (pinned()) return;
      body.classList.toggle('sb-peek', on);
    }

    // Small grace period so the pointer can travel toggle → panel
    function scheduleHide() {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () { peek(false); }, 250);
    }
    function cancelHide() { clearTimeout(hideTimer); }

    [toggle, panel].forEach(function (el) {
      el.addEventListener('mouseenter', function () { cancelHide(); peek(true); });
      el.addEventListener('mouseleave', scheduleHide);
    });

    toggle.addEventListener('click', function (e) {
      if (pinned()) {
        setPinned(false);
        // Pointer is still over the trigger/panel → degrade to overlay
        // instead of vanishing under the cursor.
        if (toggle.matches(':hover') || panel.matches(':hover')) body.classList.add('sb-peek');
      } else {
        setPinned(true);
        // Keyboard activation (Enter/Space) reports detail === 0. When opened
        // that way, move focus into the panel so the next Tab lands on Close.
        if (e.detail === 0) panel.focus();
      }
    });

    // Closing from inside the panel returns focus to the menu toggle.
    close.addEventListener('click', function (e) {
      setPinned(false);
      body.classList.remove('sb-peek');
      if (e.detail === 0) toggle.focus();
    });

    // Keyboard parity with hover: focus inside the panel keeps it revealed.
    panel.addEventListener('focusin', function () { cancelHide(); peek(true); });
    panel.addEventListener('focusout', function (e) {
      if (!panel.contains(e.relatedTarget)) scheduleHide();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && body.classList.contains('sb-peek')) peek(false);
    });

    // Tooltip timing: show after a short hover delay, self-dismiss after a
    // while (even if still hovered), hide the instant the pointer leaves, and
    // on click hide + reset the delay so it can reappear with the new label.
    if (toggleTip) {
      var TIP_SHOW = 400, TIP_AUTOHIDE = 3000;
      var tipShowT = null, tipHideT = null, tipPointerFocus = false;
      var showTip = function () {
        toggleTip.classList.add('is-visible');
        clearTimeout(tipHideT);
        tipHideT = setTimeout(function () { toggleTip.classList.remove('is-visible'); }, TIP_AUTOHIDE);
      };
      var hideTip = function () {
        clearTimeout(tipShowT); clearTimeout(tipHideT);
        toggleTip.classList.remove('is-visible');
      };
      var deferTip = function () {
        clearTimeout(tipShowT);
        tipShowT = setTimeout(showTip, TIP_SHOW);
      };
      toggle.addEventListener('mouseenter', deferTip);
      toggle.addEventListener('mouseleave', hideTip);
      // Show at once on keyboard focus, but not when focus came from a click.
      toggle.addEventListener('mousedown', function () { tipPointerFocus = true; });
      toggle.addEventListener('focus', function () { if (!tipPointerFocus) showTip(); tipPointerFocus = false; });
      toggle.addEventListener('blur', hideTip);
      toggle.addEventListener('click', function () {
        hideTip();
        if (toggle.matches(':hover')) deferTip();
      });
    }

    setIcon();
  })();
</script>

<!-- Dark / Light switch -->
<script>
  (function () {
    var SKINS = ['light', 'light-hc', 'dark', 'dark-hc'];
    var btn = document.getElementById('cp-theme-toggle');
    var icon = document.getElementById('cp-theme-icon');
    var tip = document.getElementById('cp-theme-tip');
    if (!btn) return;

    function current() {
      try { return localStorage.getItem('vanilla-skin') || 'light'; } catch (e) { return 'light'; }
    }

    function render() {
      var isDark = current().indexOf('dark') === 0;
      // Moon → "switch to dark" (light now); Sun → "switch to light" (dark now)
      var use = icon.querySelector('use');
      if (use) use.setAttribute('href', isDark ? '#sun' : '#moon');
      var label = isDark ? 'Switch to light mode' : 'Switch to dark mode';
      btn.setAttribute('aria-label', label);
      btn.setAttribute('aria-pressed', String(isDark));
      if (tip) tip.textContent = label;
    }

    btn.addEventListener('click', function () {
      var next = current().indexOf('dark') === 0 ? 'light' : 'dark';
      var r = document.documentElement;
      SKINS.forEach(function (c) { r.classList.remove(c); });
      r.classList.add(next);
      try { localStorage.setItem('vanilla-skin', next); } catch (e) {}
      render();
    });

    render();
  })();
</script>
