<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Button — Vanilla Lexicon</title>
  <script>try{var s=localStorage.getItem('vanilla-skin');if(s&&['light-hc','dark','dark-hc'].indexOf(s)>-1)document.documentElement.classList.add(s);}catch(e){}</script>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="tokens-high-contrast.css">
  <link rel="stylesheet" href="tokens-dark.css">
  <link rel="stylesheet" href="components.css">
  <script src="icons.js"></script>

  <style>
    .showcase { max-width: 720px; margin: 0 auto; padding: var(--spacing-9) var(--spacing-7); }
    .showcase h1 { font-size: var(--font-size-md); font-weight: var(--font-weight-bold); margin: 0 0 var(--spacing-3); }
    .showcase p.lead { color: var(--color-secondary); font-size: var(--font-size-sm); margin: 0 0 var(--spacing-8); }
    .showcase__row { margin-bottom: var(--spacing-7); display: flex; flex-wrap: wrap; align-items: center; gap: var(--spacing-7); }
    .showcase__label { flex: 0 0 100%; font-size: 10px; font-weight: var(--font-weight-bold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-secondary); margin-bottom: 0; }
  </style>
</head>
<body>

<main class="showcase">
  <h1>Radio Button</h1>
  <p class="lead">
    Source: <a href="https://www.figma.com/design/YNNkt9Xd6ImDtEvIz4tETF/Lexicon-Components?node-id=796-16477">Figma — Lexicon Components</a>.
    Sibling of Checkbox with the same 24×24 circular focus ring. Checked state = 4px primary ring.
  </p>

  <div class="showcase__row">
    <span class="showcase__label">Unchecked, checked, focus</span>

    <label class="radio" aria-label="Unchecked">
      <input type="radio" name="demo1" class="radio__input">
      <span class="radio__box"></span>
    </label>

    <label class="radio" aria-label="Checked">
      <input type="radio" name="demo1" class="radio__input" checked>
      <span class="radio__box"></span>
    </label>
  </div>

  <div class="showcase__row">
    <span class="showcase__label">Group with labels — single selection</span>

    <label class="radio">
      <input type="radio" name="demo2" class="radio__input">
      <span class="radio__box"></span>
      <span class="radio__label">Option one</span>
    </label>

    <label class="radio">
      <input type="radio" name="demo2" class="radio__input" checked>
      <span class="radio__box"></span>
      <span class="radio__label">Option two</span>
    </label>

    <label class="radio">
      <input type="radio" name="demo2" class="radio__input">
      <span class="radio__box"></span>
      <span class="radio__label">Option three</span>
    </label>
  </div>

  <div class="showcase__row">
    <span class="showcase__label">Disabled — unchecked &amp; checked</span>

    <label class="radio">
      <input type="radio" name="demo3" class="radio__input" disabled>
      <span class="radio__box"></span>
      <span class="radio__label">Disabled off</span>
    </label>

    <label class="radio">
      <input type="radio" name="demo3" class="radio__input" checked disabled>
      <span class="radio__box"></span>
      <span class="radio__label">Disabled on</span>
    </label>
  </div>

</main>

</body>
</html>
