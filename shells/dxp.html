  <title>Screen title — Lexicon Vanilla</title>

  <script>(function(){
    var S=['light','light-hc','dark','dark-hc'];
    function apply(){try{
      var r=document.documentElement;
      var s=localStorage.getItem('vanilla-skin')||'light';
      S.forEach(function(c){r.classList.remove(c);});
      r.classList.add(S.indexOf(s)>-1?s:'light');
      if(localStorage.getItem('vanilla-cms-style')==='1'){
        r.style.setProperty('--rounded-sm','4px');
        r.style.setProperty('--rounded-md','8px');
        r.style.setProperty('--rounded-lg','16px');
      }else{
        r.style.removeProperty('--rounded-sm');
        r.style.removeProperty('--rounded-md');
        r.style.removeProperty('--rounded-lg');
      }
    }catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>

  <style>
    html, body { height: 100%; }

    /* ── Control Panel collapse ─────────────────────────────────
       The Control Menu toggle (and the panel's own close button)
       collapse the left grid column from 320px to 0. The base
       grid-template lives here (not inline) so this override wins. */
    body { grid-template-columns: 320px 1fr; transition: grid-template-columns 200ms ease; }
    body.cp-collapsed { grid-template-columns: 0 1fr; }
    .control-panel { transition: width 200ms ease; }
    body.cp-collapsed .control-panel {
      width: 0;
      overflow: hidden;
      border-right-width: 0;
    }

    /* ── Header action buttons ──────────────────────────────────
       Theme switch + Sites + Close, pinned to the right of the title. */
    .control-panel__actions {
      align-items: center;
      display: flex;
      flex-shrink: 0;
      gap: var(--spacing-2);
      margin-left: auto;
    }

    /* Close button: behaves like Bootstrap's visually-hidden-focusable.
       While it lacks keyboard focus it is pulled out of flow (position:
       absolute → no longer a flex item), so it reserves no space and no
       gap. On keyboard focus it snaps back into the row at full size.
       It is first in the DOM (first Tab stop) but `order` renders it last. */
    .control-panel__close { order: 1; }
    .control-panel__close:not(:focus-visible) {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    /* The panel receives focus (tabindex=-1) when opened by keyboard; it is
       a deliberate jump, so suppress the container outline. */
    .control-panel:focus { outline: none; }

    /* ── Hover / focus tooltip ──────────────────────────────────
       Reuses the .tooltip component visual; the wrapper anchors it
       below the button and reveals it on hover or keyboard focus. */
    .cp-tip { position: relative; display: inline-flex; }
    .cp-tip__bubble {
      position: absolute;
      top: calc(100% + var(--spacing-2));
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 20;
    }
    .cp-tip:hover .cp-tip__bubble,
    .cp-tip:focus-within .cp-tip__bubble { opacity: 1; }
  </style>
</head>

<!-- Collapsible Control Panel groups -->
<script>
  (function () {
    document.querySelectorAll('.control-panel__group-header').forEach(function (btn) {
      var chevron = btn.querySelector('svg.lexicon-icon:last-child');
      if (chevron) chevron.style.transition = 'transform 150ms ease';

      var group = btn.parentElement;
      var items = group ? Array.from(group.querySelectorAll('.control-panel__item')) : [];

      // Sync initial collapsed state
      if (btn.getAttribute('aria-expanded') === 'false') {
        items.forEach(function (el) { el.style.display = 'none'; });
        if (chevron) chevron.style.transform = 'rotate(-90deg)';
      }

      btn.addEventListener('click', function () {
        var expanded = btn.getAttribute('aria-expanded') !== 'false';
        var next = !expanded;
        btn.setAttribute('aria-expanded', String(next));
        items.forEach(function (el) { el.style.display = next ? '' : 'none'; });
        if (chevron) chevron.style.transform = next ? '' : 'rotate(-90deg)';
      });
    });
  })();
</script>

<!-- Control Panel open/close — driven by the Control Menu toggle and the panel's close button -->
<script>
  (function () {
    var toggle = document.getElementById('cp-toggle');
    var toggleIcon = document.getElementById('cp-toggle-icon');
    var close = document.getElementById('cp-close');
    var panel = document.getElementById('control-panel');

    function setOpen(open) {
      document.body.classList.toggle('cp-collapsed', !open);
      if (toggle) toggle.setAttribute('aria-expanded', String(open));
      if (toggleIcon) {
        var use = toggleIcon.querySelector('use');
        if (use) use.setAttribute('href', open ? '#product-menu-open' : '#product-menu-closed');
      }
    }

    if (toggle) toggle.addEventListener('click', function (e) {
      var willOpen = document.body.classList.contains('cp-collapsed');
      setOpen(willOpen);
      // Keyboard activation (Enter/Space) reports detail === 0. When opened that
      // way, move focus into the panel so the next Tab lands on the Close button.
      if (willOpen && e.detail === 0 && panel) panel.focus();
    });

    // Closing from inside the panel returns focus to the menu toggle.
    if (close) close.addEventListener('click', function (e) {
      setOpen(false);
      if (e.detail === 0 && toggle) toggle.focus();
    });
  })();
</script>

<!-- Dark / Light switch -->
<script>
  (function () {
    var SKINS = ['light', 'light-hc', 'dark', 'dark-hc'];
    var btn = document.getElementById('cp-theme-toggle');
    var icon = document.getElementById('cp-theme-icon');
    var tip = document.getElementById('cp-theme-tip');
    if (!btn) return;

    function current() {
      try { return localStorage.getItem('vanilla-skin') || 'light'; } catch (e) { return 'light'; }
    }

    function render() {
      var isDark = current().indexOf('dark') === 0;
      // Moon → "switch to dark" (light now); Sun → "switch to light" (dark now)
      var use = icon.querySelector('use');
      if (use) use.setAttribute('href', isDark ? '#sun' : '#moon');
      var label = isDark ? 'Switch to light mode' : 'Switch to dark mode';
      btn.setAttribute('aria-label', label);
      btn.setAttribute('aria-pressed', String(isDark));
      if (tip) tip.textContent = label;
    }

    btn.addEventListener('click', function () {
      var next = current().indexOf('dark') === 0 ? 'light' : 'dark';
      var r = document.documentElement;
      SKINS.forEach(function (c) { r.classList.remove(c); });
      r.classList.add(next);
      try { localStorage.setItem('vanilla-skin', next); } catch (e) {}
      render();
    });

    render();
  })();
</script>
