<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype</title>

  <!-- Lexicon kit — in this order -->
  <script>(function(){
    var S=['light','light-hc','dark','dark-hc'];
    function apply(){try{var s=localStorage.getItem('vanilla-skin')||'light';S.forEach(function(c){document.documentElement.classList.remove(c);});document.documentElement.classList.add(S.indexOf(s)>-1?s:'light');}catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../tokens-high-contrast.css">
  <link rel="stylesheet" href="../tokens-dark.css">
  <link rel="stylesheet" href="../components.css">
  <script src="../icons.js"></script>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════
     EDIT BELOW.
     Components: see ../components.html for live variants (all components, one page).
     Icons: <svg class="lexicon-icon"><use href="#name"></use></svg>
            (513 names — grep ../icons.svg for `<symbol id=`)
     Tokens only: var(--color-…), var(--spacing-…), var(--font-size-…).
     ════════════════════════════════════════════════════════════════ -->

<main style="padding: var(--spacing-7);">
  <h1 style="font-size: var(--font-size-md); font-weight: var(--font-weight-bold);">Replace this with your screen</h1>
  <p style="color: var(--color-secondary); font-size: var(--font-size-sm);">
    Copy this file as <code>vanilla/prototypes/&lt;slug&gt;.html</code> and start composing.
  </p>
</main>

</body>
</html>
